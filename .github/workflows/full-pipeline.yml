# Complete CI/CD Pipeline - Demo đầy đủ quy trình
name: Full CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  # Job 1: Build and Test (CI)
  continuous-integration:
    name: CI - Build & Test
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout source code
      uses: actions/checkout@v4
    
    - name: Setup Java JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    
    - name: Compile source code
      run: mvn clean compile
    
    - name: Run unit tests
      run: mvn test
    
    - name: Build JAR package
      run: mvn package -DskipTests
    
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: target/*.jar
  
  # Job 2: Build Docker Image (chỉ chạy khi merge vào main)
  docker-build:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: continuous-integration
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and Push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          tong1603/student-management:latest
          tong1603/student-management:${{ github.sha }}
  
  # Job 3: Deploy to Render (chỉ chạy khi merge vào main)
  continuous-deployment:
    name: CD - Deploy to Render
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Trigger Render deployment
      run: |
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        echo "✅ Deployment triggered successfully!"
