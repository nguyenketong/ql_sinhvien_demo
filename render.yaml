services:
  - type: web
    name: student-management
    env: docker
    plan: free
    branch: main
    healthCheckPath: /students
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        fromDatabase:
          name: student-db
          property: connectionString
